version: "3.9"

services:
  # ─── Memos: 轻量级记忆服务 ───
  memos:
    image: neosmemo/memos:stable
    container_name: openclaw-memos
    restart: unless-stopped
    ports:
      - "${MEMOS_PORT:-5230}:5230"
    volumes:
      - memos-data:/var/opt/memos
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5230/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── MySQL: 结构化业务数据 ───
  mysql:
    image: mysql:8.0.40
    container_name: openclaw-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-openclaw_business}
      MYSQL_USER: ${MYSQL_USER:-openclaw}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-openclaw_password}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
      --slow-query-log=1
      --long-query-time=2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── 可选: Adminer (MySQL Web UI) ───
  adminer:
    image: adminer:latest
    container_name: openclaw-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - tools
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  memos-data:
    driver: local
  mysql-data:
    driver: local
